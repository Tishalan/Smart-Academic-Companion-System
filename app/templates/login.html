{% extends "base.html" %}

{% block title %}Login - Smart Academic{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5 col-lg-4">
        <div class="card p-4 border-0 shadow-lg" style="border-radius: 20px;">
            <div class="card-body text-center">
                <div class="mb-4">
                    <div class="bg-primary bg-opacity-10 rounded-circle d-inline-flex align-items-center justify-content-center mb-3"
                        style="width: 70px; height: 70px;">
                        <i class="fas fa-lock text-primary fs-2"></i>
                    </div>
                    <h2 class="fw-bold mb-1">Welcome Back</h2>
                    <p class="text-muted">Enter your credentials to continue</p>
                </div>

                <form method="POST">
                    <div class="form-floating mb-3 text-start">
                        <input type="text" class="form-control rounded-3" id="username" name="username"
                            placeholder="Username" required>
                        <label for="username">Username</label>
                    </div>
                    <div class="form-floating mb-3 text-start">
                        <input type="password" class="form-control rounded-3" id="password" name="password"
                            placeholder="Password" required>
                        <label for="password">Password</label>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="remember" id="remember">
                            <label class="form-check-label small text-muted" for="remember">Remember me</label>
                        </div>
                        <a href="#" class="small text-primary text-decoration-none">Forgot Password?</a>
                    </div>

                    <button type="submit" class="btn btn-primary-gradient w-100 py-3 mb-3 shadow">
                        Sign In
                    </button>

                    <p class="text-muted mb-0 small"><i class="fas fa-info-circle me-1"></i> Registration is managed by
                        the Administrator.</p>
                </form>
            </div>
        </div>


    </div>
</div>
{% endblock %}
